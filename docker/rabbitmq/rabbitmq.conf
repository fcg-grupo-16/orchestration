# Teto de memória ABSOLUTO para o broker.
#
# Sem awareness do cgroup, o RabbitMQ detecta a memória do HOST e nunca aplica flow control,
# crescendo até o kernel matar o container (OOMKilled) no limite do k8s. Com um teto absoluto,
# o broker bloqueia publishers (memory alarm) ANTES de estourar o limite do container.
# Valor casado com o limite de memória do Deployment k8s (768Mi) — deixa folga acima do teto.
vm_memory_high_watermark.absolute = 384MiB
