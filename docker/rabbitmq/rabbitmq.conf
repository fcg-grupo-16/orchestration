# Teto de memória ABSOLUTO para o broker.
#
# Sem awareness do cgroup, o RabbitMQ detecta a memória do HOST e nunca aplica flow control,
# crescendo até o kernel matar o container (OOMKilled) no limite do k8s. Com um teto absoluto,
# o broker bloqueia publishers (memory alarm) ANTES de estourar o limite do container.
# Valor casado com o limite de memória do Deployment k8s (1Gi) — deixa folga acima do teto.
# 384MiB era agressivo demais: sob acúmulo de filas/conexões o broker tripava o flow control
# e bloqueava TODOS os publishers (memory alarm sem auto-recuperação). 576MiB dá folga para a
# operação normal, mantendo a proteção de OOM (limite do container em 1Gi).
vm_memory_high_watermark.absolute = 576MiB
