# RabbitMQ — broker de mensageria (com Management UI na porta 15672).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: fcg
  labels:
    app: rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          # Imagem custom (rabbitmq:3.13-management + plugin rabbitmq_delayed_message_exchange),
          # construída e carregada no minikube pelo scripts/deploy-minikube.sh. Ver docker/rabbitmq/.
          image: fcg-rabbitmq:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5672    # AMQP
            - containerPort: 15672   # Management UI
          envFrom:
            - secretRef:
                name: rabbitmq-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "check_running"]
            initialDelaySeconds: 20
            periodSeconds: 15
---
# O Secret `rabbitmq-secret` agora vem CIFRADO de k8s/05-sealed-secrets.yaml (Sealed Secrets);
# o controller o materializa neste namespace. Gerar/rotacionar com scripts/seal-secrets.sh.
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: fcg
  labels:
    app: rabbitmq
spec:
  type: ClusterIP
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
