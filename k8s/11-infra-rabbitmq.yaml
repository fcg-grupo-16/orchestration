# RabbitMQ — broker de mensageria (com Management UI na porta 15672).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: fcg
  labels:
    app: rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          # Imagem custom (rabbitmq:3.13.7-management + plugin rabbitmq_delayed_message_exchange),
          # construída e carregada no minikube pelo script deploy-minikube.sh. Ver docker/rabbitmq/.
          image: fcg-rabbitmq:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5672    # AMQP
            - containerPort: 15672   # Management UI
          envFrom:
            - secretRef:
                name: rabbitmq-secret
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              # Folga acima do vm_memory_high_watermark.absolute (576MiB) da imagem: o broker
              # aplica flow control em 576MiB, com ~448Mi de folga até este teto — evita OOMKilled
              # sem tripar o flow control (que bloqueia publishers) sob carga normal.
              memory: 1Gi
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 20
            # ping pode passar de 1s (default) sob carga/pressão de memória — evita restart espúrio.
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "check_running"]
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 10
---
# O Secret `rabbitmq-secret` agora vem CIFRADO de k8s/05-sealed-secrets.yaml (Sealed Secrets);
# o controller o materializa neste namespace. Gerar/rotacionar com scripts/seal-secrets.sh.
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: fcg
  labels:
    app: rabbitmq
spec:
  type: ClusterIP
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
