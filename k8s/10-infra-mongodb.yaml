# MongoDB — banco compartilhado (databases separados por serviço: usersdb, catalogdb).
# StatefulSet com armazenamento persistente: o volumeClaimTemplates gera um PVC
# (mongo-data-mongodb-0) que SOBREVIVE à recriação do Pod. O Service ClusterIP
# `mongodb` (abaixo) mantém o DNS interno, então as APIs seguem conectando por
# mongodb://mongodb:27017 sem mudança de config.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: fcg
  labels:
    app: mongodb
spec:
  serviceName: mongodb          # precisa casar com o nome do Service headless/ClusterIP
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 15
            periodSeconds: 15
  volumeClaimTemplates:
    - metadata:
        name: mongo-data        # vira o nome base do PVC: mongo-data-mongodb-0
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard   # StorageClass padrão do minikube (provisionamento dinâmico)
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: fcg
  labels:
    app: mongodb
spec:
  type: ClusterIP
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
