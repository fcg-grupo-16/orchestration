apiVersion: v1
kind: ConfigMap
metadata:
  name: payments-api-config
  namespace: fcg
  labels:
    app: payments-api
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  RabbitMq__Host: "rabbitmq"
  Payments__MaxApprovedAmount: "5000"
---
apiVersion: v1
kind: Secret
metadata:
  name: payments-api-secret
  namespace: fcg
  labels:
    app: payments-api
type: Opaque
stringData:
  RabbitMq__Username: "guest"
  RabbitMq__Password: "guest"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: fcg
  labels:
    app: payments-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments-api
  template:
    metadata:
      labels:
        app: payments-api
    spec:
      initContainers:
        - name: wait-for-rabbitmq
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ['sh', '-c', 'until nc -z rabbitmq 5672; do echo "aguardando rabbitmq..."; sleep 2; done']
      containers:
        - name: payments-api
          image: payments-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: payments-api-config
            - secretRef:
                name: payments-api-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: payments-api
  namespace: fcg
  labels:
    app: payments-api
spec:
  type: ClusterIP
  selector:
    app: payments-api
  ports:
    - port: 80
      targetPort: 8080
