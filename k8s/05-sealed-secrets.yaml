# GERADO por scripts/seal-secrets.sh — NÃO editar à mão.
#
# SealedSecrets cifrados (Bitnami Sealed Secrets). SEGUROS para versionar: apenas o
# controller DESTE cluster (namespace kube-system) consegue decifrá-los. Os valores
# são de DEMONSTRAÇÃO. Para regenerar/rotacionar: ./scripts/seal-secrets.sh
#
# JwtSettings__SecretKey é IDÊNTICA em users-api-secret e catalog-api-secret (JWT parity).
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: rabbitmq-secret
  namespace: fcg
spec:
  encryptedData:
    RABBITMQ_DEFAULT_PASS: 
    RABBITMQ_DEFAULT_USER: 
  template:
    metadata:
      name: rabbitmq-secret
      namespace: fcg
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: users-api-secret
  namespace: fcg
spec:
  encryptedData:
    JwtSettings__SecretKey: 
    MongoDbSettings__ConnectionString: 
    RabbitMq__Password: 
    RabbitMq__Username: 
  template:
    metadata:
      labels:
        app: users-api
      name: users-api-secret
      namespace: fcg
---
apiVersion: bitnami.com/v1alpha1
