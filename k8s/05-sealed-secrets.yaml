metadata:
  name: catalog-api-secret
  namespace: fcg
spec:
  encryptedData:
    JwtSettings__SecretKey: 
    MongoDbSettings__ConnectionString: 
    RabbitMq__Password: 
    RabbitMq__Username: 
  template:
    metadata:
      labels:
        app: catalog-api
      name: catalog-api-secret
      namespace: fcg
